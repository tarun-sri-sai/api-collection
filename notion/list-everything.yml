info:
  name: list-everything
  type: http
  seq: 1

http:
  method: POST
  url: https://api.notion.com/v1/search
  headers:
    - name: Content-Type
      value: application/json
    - name: Notion-Version
      value: 2022-06-28
  auth:
    type: bearer
    token: "{{NOTION_TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
