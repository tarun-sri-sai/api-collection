info:
  name: list-vulnerabilities
  type: http
  seq: 1

http:
  method: GET
  url: https://services.nvd.nist.gov/rest/json/cves/2.0?startIndex=0&resultsPerPage=100&pubStartDate={{PUB_START_DATE}}&pubEndDate={{PUB_END_DATE}}
  params:
    - name: startIndex
      value: "0"
      type: query
    - name: resultsPerPage
      value: "100"
      type: query
    - name: pubStartDate
      value: "{{PUB_START_DATE}}"
      type: query
    - name: pubEndDate
      value: "{{PUB_END_DATE}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
